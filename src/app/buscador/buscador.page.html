
<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Buscador</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Buscador</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-searchbar
    [(ngModel)]="searchText"
    (ionInput)="onSearch()" 
    debounce="500"
    placeholder="Buscar por título">
  </ion-searchbar>

  <ion-list>
    <ion-item *ngFor="let publicacion of publicacionesFiltradas">
      <ion-avatar [style.alignSelf]="'flex-start'" [style.marginRight]="'10px'">
        <img [src]="publicacion.avatar" />
      </ion-avatar>

      <ion-label>
        <h2>{{ publicacion.title }}</h2>
        <p>{{ publicacion.content }}</p>
        <p><strong>Likes:</strong> {{ publicacion.likes }}</p>
        <p><strong>Comentarios:</strong> {{ publicacion.comments.length }}</p>

        <ion-button fill="clear" (click)="commentOnPost(publicacion)">
          <ion-icon name="chatbubble-outline"></ion-icon>
        </ion-button>

        <ion-button fill="clear" (click)="repeatPost(publicacion)">
          <ion-icon name="repeat-outline"></ion-icon>
        </ion-button>

        <ion-button fill="clear" (click)="likePost(publicacion)">
          <ion-icon [name]="publicacion.liked ? 'heart' : 'heart-outline'" color="danger"></ion-icon>
        </ion-button>

        <ion-button fill="clear" (click)="sharePost(publicacion)">
          <ion-icon name="share-outline"></ion-icon>
        </ion-button>
      </ion-label>
    </ion-item>
  </ion-list>
</ion-content>
